syntax = "proto3";
package jaws;

// JawsService provides secure remote access to secret providers via mTLS.
service JawsService {
  // Enrollment - client submits a CSR and enrollment token, receives a signed cert.
  rpc Enroll(EnrollRequest) returns (EnrollResponse);

  // List all providers available on the server.
  rpc ListProviders(ListProvidersRequest) returns (ListProvidersResponse);

  // List all secret names for a given provider (streaming).
  rpc ListSecrets(ListSecretsRequest) returns (stream SecretEntry);

  // Get a secret's value.
  rpc GetSecret(GetSecretRequest) returns (GetSecretResponse);

  // Create a new secret.
  rpc CreateSecret(CreateSecretRequest) returns (CreateSecretResponse);

  // Update an existing secret's value.
  rpc UpdateSecret(UpdateSecretRequest) returns (UpdateSecretResponse);

  // Delete a secret.
  rpc DeleteSecret(DeleteSecretRequest) returns (DeleteSecretResponse);

  // Rollback a secret to a previous version.
  rpc RollbackSecret(RollbackSecretRequest) returns (RollbackSecretResponse);

  // Check server health / connectivity.
  rpc Ping(PingRequest) returns (PingResponse);
}

// ── Enrollment ────────────────────────────────────────────────────────

message EnrollRequest {
  // One-time enrollment token generated by the server.
  string token = 1;
  // Client name (human-readable identifier for this client).
  string client_name = 2;
  // PEM-encoded Certificate Signing Request from the client.
  string csr_pem = 3;
}

message EnrollResponse {
  // PEM-encoded client certificate signed by the server's CA.
  string client_cert_pem = 1;
  // PEM-encoded CA certificate (for the client to trust the server).
  string ca_cert_pem = 2;
  // Server name (used as provider prefix on the client).
  string server_name = 3;
}

// ── Provider listing ──────────────────────────────────────────────────

message ListProvidersRequest {}

message ProviderInfo {
  // Provider ID (e.g., "aws-prod", "op-team").
  string id = 1;
  // Provider kind (e.g., "aws", "onepassword", "jaws").
  string kind = 2;
  // Whether this provider supports rollback.
  bool supports_rollback = 3;
  // Whether this provider supports remote history.
  bool supports_remote_history = 4;
}

message ListProvidersResponse {
  repeated ProviderInfo providers = 1;
}

// ── Secret operations ─────────────────────────────────────────────────

message ListSecretsRequest {
  // Provider ID to list secrets from.
  string provider_id = 1;
}

message SecretEntry {
  // Secret name / reference.
  string name = 1;
}

message GetSecretRequest {
  // Provider ID.
  string provider_id = 1;
  // Secret name / API reference.
  string name = 2;
}

message GetSecretResponse {
  // The secret value.
  string value = 1;
}

message CreateSecretRequest {
  // Provider ID.
  string provider_id = 1;
  // Secret name.
  string name = 2;
  // Secret value.
  string value = 3;
  // Optional description.
  string description = 4;
}

message CreateSecretResponse {
  // The created secret's version ID or identifier.
  string version_id = 1;
}

message UpdateSecretRequest {
  // Provider ID.
  string provider_id = 1;
  // Secret name.
  string name = 2;
  // New secret value.
  string value = 3;
}

message UpdateSecretResponse {
  // The updated secret's version ID.
  string version_id = 1;
}

message DeleteSecretRequest {
  // Provider ID.
  string provider_id = 1;
  // Secret name.
  string name = 2;
  // Force deletion without recovery period.
  bool force = 3;
}

message DeleteSecretResponse {}

message RollbackSecretRequest {
  // Provider ID.
  string provider_id = 1;
  // Secret name.
  string name = 2;
  // Optional version ID to rollback to.
  string version_id = 3;
}

message RollbackSecretResponse {
  // The version ID that was restored.
  string restored_version_id = 1;
}

// ── Health check ──────────────────────────────────────────────────────

message PingRequest {}

message PingResponse {
  // Server name.
  string server_name = 1;
  // Server version.
  string version = 2;
  // Number of available providers.
  int32 provider_count = 3;
}
