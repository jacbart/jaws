[advisories]
ignore = [
  { id = "RUSTSEC-2023-0071", reason = "rsa Marvin Attack: no fix available in age or bitwarden-crypto upstream" },
  { id = "RUSTSEC-2025-0119", reason = "number_prefix unmaintained: pulled in by indicatif, no safe upgrade" },
  { id = "RUSTSEC-2026-0173", reason = "proc-macro-error2 unmaintained: upstream in bitwarden and age" },
]

[licenses]
allow = [
  "MIT",
  "Apache-2.0",
  "BSD-2-Clause",
  "BSD-3-Clause",
  "ISC",
  "Zlib",
  "MPL-2.0",
  "Unicode-3.0",
  "CDLA-Permissive-2.0",
  "GPL-3.0",
  "GPL-3.0-only",
  "LicenseRef-Bitwarden-SDK",
]
unused-allowed-license = "allow"

[[licenses.clarify]]
crate = "bitwarden"
expression = "GPL-3.0-only"
license-files = [
  { path = "LICENSE", hash = 0xde4da07d },
]

